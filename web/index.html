<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Devin Remote — drive your Devin CLI sessions from any browser, over ACP" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 24'%3E%3Cpath d='M1 12 L6.5 3.2 L14.5 3.2 L20 12 L14.5 20.8 L6.5 20.8 Z' fill='%232563eb'/%3E%3Cpath d='M20 12 L25.5 3.2 L33.5 3.2 L39 12 L33.5 20.8 L25.5 20.8 Z' fill='%232563eb'/%3E%3C/svg%3E" />
    <title>Devin Remote</title>
    <style>
      /* Boot splash — replaced by React on mount */
      html { background: #faf9f6; }
      #dc-boot {
        position: fixed; inset: 0; display: flex; background: #faf9f6;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      #dc-boot .side {
        width: 280px; border-right: 1px solid #e8e5df; padding: 16px;
        display: flex; flex-direction: column; gap: 10px; background: #faf9f6;
      }
      #dc-boot .main { flex: 1; display: flex; flex-direction: column; }
      #dc-boot .chat { flex: 1; display: flex; align-items: center; justify-content: center; }
      #dc-boot .sk {
        background: #eceae4; border-radius: 8px;
        animation: dcsk 1.6s ease-in-out infinite;
      }
      @keyframes dcsk { 0%,100% { opacity: .5 } 50% { opacity: 1 } }
      #dc-boot .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
      #dc-boot .logo-text { color: #1a1a1e; font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
      @media (max-width: 768px) { #dc-boot .side { display: none; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="dc-boot">
        <div class="side">
          <div class="logo">
            <svg width="26" height="16" viewBox="0 0 40 24"><path d="M1 12 L6.5 3.2 L14.5 3.2 L20 12 L14.5 20.8 L6.5 20.8 Z" fill="#1a1a1e"/><path d="M20 12 L25.5 3.2 L33.5 3.2 L39 12 L33.5 20.8 L25.5 20.8 Z" fill="#1a1a1e"/></svg>
            <span class="logo-text">Devin Remote</span>
          </div>
          <div class="sk" style="height: 34px"></div>
          <div class="sk" style="height: 22px; width: 70%"></div>
          <div class="sk" style="height: 22px; width: 85%"></div>
          <div class="sk" style="height: 22px; width: 60%"></div>
        </div>
        <div class="main">
          <div class="chat"><div class="sk" style="width: 220px; height: 18px"></div></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
